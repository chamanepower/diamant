<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Diamant</title>
    <style>
        /* Style général de l'application */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            color: #2c3e50;
        }

        p {
            font-size: 14px;
            color: #7f8c8d;
            margin: 5px 0 0 0;
        }

        /* Conteneur pour le dessin SVG */
        .canvas-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 20px;
            width: 90%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
        }

        /* Rendre le SVG responsive (s'adapte à l'écran) */
        svg {
            width: 100%;
            height: 100%;
            max-height: 100%;
            display: block;
        }

        /* Effet au survol des lignes du diamant */
        path {
            transition: stroke 0.3s ease, stroke-width 0.3s ease;
        }

        path:hover {
            stroke: #3498db !important; /* Change la couleur en bleu au survol */
            stroke-width: 2px !important; /* Épaissit légèrement la ligne */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Visualisateur de Diamant</h1>
        <p>Dessin vectoriel interactif</p>
    </header>
